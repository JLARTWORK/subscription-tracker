<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <script>
    (function () {
      const theme = localStorage.getItem('subs-tracker-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = theme === 'light' ? '#fafafa' : '#09090b';
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JL SubNexus">
  <meta name="description" content="JL SubNexus — private payment and subscription tracker in your browser.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>JL SubNexus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    :root {
      --font-sans: 'Inter', system_ui, sans-serif;
    }
    
    body {
      font-family: var(--font-sans);
    }
    
    .font-display {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 600;
    }

    .sub-card {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                  box-shadow 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    
    .sub-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    .modal {
      animation: modalPop 0.2s cubic-bezier(0.32, 0.72, 0, 1);
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .money {
      font-variant-numeric: tabular-nums;
    }

    .renewal-date {
      font-variant-numeric: tabular-nums;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
    }

    .sub-row {
      transition: background-color 0.1s ease;
    }
    
    .sub-row:hover {
      background-color: #18181b;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
    }

    .stat-number {
      font-variant-numeric: tabular-nums;
    }

    .row-actions {
      opacity: 1;
    }

    @media (min-width: 640px) {
      .row-actions {
        opacity: 0;
      }

      .sub-row:hover .row-actions,
      .sub-row:focus-within .row-actions {
        opacity: 1;
      }
    }

    .theme-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .theme-switch-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #3f3f46;
      border-radius: 9999px;
      transition: background-color 0.2s ease;
    }

    .theme-switch-slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: #fafafa;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .theme-switch input:checked + .theme-switch-slider {
      background-color: #fbbf24;
    }

    .theme-switch input:checked + .theme-switch-slider::before {
      transform: translateX(20px);
      background-color: #fffbeb;
    }

    [data-theme="light"] body {
      color: #09090b;
    }

    [data-theme="light"] .bg-zinc-950 {
      background-color: #fafafa !important;
    }

    [data-theme="light"] .bg-zinc-900 {
      background-color: #ffffff !important;
    }

    [data-theme="light"] .bg-zinc-800 {
      background-color: #f4f4f5 !important;
    }

    [data-theme="light"] .border-zinc-800,
    [data-theme="light"] .border-zinc-700,
    [data-theme="light"] .divide-zinc-800 > :not([hidden]) ~ :not([hidden]) {
      border-color: #e4e4e7 !important;
    }

    [data-theme="light"] .border-zinc-600 {
      border-color: #d4d4d8 !important;
    }

    [data-theme="light"] .text-zinc-200,
    [data-theme="light"] .text-zinc-300,
    [data-theme="light"] .text-zinc-400,
    [data-theme="light"] .text-zinc-500,
    [data-theme="light"] .text-zinc-600 {
      color: #09090b !important;
    }

    [data-theme="light"] .hover\:bg-zinc-900:hover,
    [data-theme="light"] .hover\:bg-zinc-800:hover,
    [data-theme="light"] .hover\:bg-zinc-950:hover {
      background-color: #f4f4f5 !important;
    }

    [data-theme="light"] .hover\:bg-zinc-700:hover {
      background-color: #e4e4e7 !important;
    }

    [data-theme="light"] .hover\:bg-zinc-200:hover {
      background-color: #e4e4e7 !important;
    }

    [data-theme="light"] .hover\:text-zinc-300:hover {
      color: #09090b !important;
    }

    [data-theme="light"] .sub-row:hover {
      background-color: #f4f4f5;
    }

    [data-theme="light"] .focus\:border-zinc-700:focus {
      border-color: #a1a1aa !important;
    }

    [data-theme="light"] .placeholder\:text-zinc-600::placeholder {
      color: #3f3f46 !important;
    }

    [data-theme="light"] .bg-white.text-zinc-950,
    [data-theme="light"] #save-button.bg-white {
      background-color: #18181b !important;
      color: #fafafa !important;
    }

    [data-theme="light"] .bg-white.hover\:bg-zinc-200:hover {
      background-color: #27272a !important;
    }

    [data-theme="light"] .bg-black\/70 {
      background-color: rgb(0 0 0 / 0.35) !important;
    }

    [data-theme="light"] .bg-amber-900\/40 {
      background-color: rgb(251 191 36 / 0.15) !important;
    }

    [data-theme="light"] .text-amber-400 {
      color: #b45309 !important;
    }

    [data-theme="light"] .bg-blue-900\/40 {
      background-color: rgb(59 130 246 / 0.12) !important;
    }

    [data-theme="light"] .text-blue-400 {
      color: #2563eb !important;
    }

    [data-theme="light"] .bg-emerald-900\/30 {
      background-color: rgb(16 185 129 / 0.12) !important;
    }

    [data-theme="light"] .hover\:bg-emerald-900\/50:hover {
      background-color: rgb(16 185 129 / 0.2) !important;
    }

    [data-theme="light"] .text-emerald-400 {
      color: #059669 !important;
    }

    [data-theme="light"] .hover\:bg-red-900\/60:hover {
      background-color: rgb(239 68 68 / 0.12) !important;
    }

    [data-theme="light"] .hover\:text-red-400:hover,
    [data-theme="light"] .text-red-400 {
      color: #dc2626 !important;
    }

    [data-theme="light"] .text-orange-400 {
      color: #ea580c !important;
    }

    [data-theme="light"] .theme-switch-slider {
      background-color: #d4d4d8;
    }

    [data-theme="light"] .theme-switch input:checked + .theme-switch-slider {
      background-color: #fbbf24;
    }

    [data-theme="light"] .text-violet-400 {
      color: #7c3aed !important;
    }

    [data-theme="light"] .bg-violet-900\/30 {
      background-color: rgb(139 92 246 / 0.12) !important;
    }

    [data-theme="light"] .border-violet-800\/50 {
      border-color: rgb(139 92 246 / 0.25) !important;
    }

    .app-logo-wrap {
      width: 48px;
      height: 48px;
      border-radius: 9999px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow:
        0 0 0 2px rgb(212 175 55 / 0.45),
        0 4px 14px rgb(0 0 0 / 0.35);
    }

    .app-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    [data-theme="light"] .app-logo-wrap {
      box-shadow:
        0 0 0 2px rgb(180 140 30 / 0.55),
        0 4px 12px rgb(0 0 0 / 0.12);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-x-3 min-w-0">
        <div class="app-logo-wrap" aria-hidden="true">
          <img src="logo-header.png" alt="" class="app-logo" width="48" height="48">
        </div>
        <div class="min-w-0">
          <h1 class="font-display text-2xl sm:text-3xl tracking-tighter truncate">JL SubNexus</h1>
          <p class="text-zinc-500 text-sm -mt-1 truncate">Payment &amp; Subscription Nexus</p>
        </div>
      </div>
      
      <div class="flex items-center gap-x-2">
        <div class="relative">
          <button id="settings-btn" onclick="toggleSettings(event)"
                  class="flex items-center justify-center w-10 h-10 rounded-2xl border border-zinc-800 hover:bg-zinc-900 transition-colors"
                  aria-label="Settings" aria-expanded="false" aria-haspopup="true">
            <i class="fa-solid fa-gear text-sm"></i>
          </button>
          <div id="settings-menu"
               class="hidden absolute right-0 top-full mt-2 w-72 bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl z-40 overflow-hidden">
            <div class="px-4 py-3 border-b border-zinc-800">
              <div class="text-sm font-medium">Settings</div>
              <div class="text-xs text-zinc-500 mt-0.5">App preferences</div>
            </div>
            <div class="px-4 py-3 flex items-center justify-between gap-3">
              <div class="min-w-0">
                <div class="text-sm font-medium flex items-center gap-x-2">
                  <i id="theme-mode-icon" class="fa-solid fa-moon text-xs text-zinc-400"></i>
                  <span>Appearance</span>
                </div>
                <div id="theme-mode-label" class="text-xs text-zinc-500 mt-0.5">Dark mode</div>
              </div>
              <label class="theme-switch" title="Toggle light/dark theme">
                <input type="checkbox" id="theme-toggle" aria-label="Use light theme">
                <span class="theme-switch-slider"></span>
              </label>
            </div>
          </div>
        </div>
        <button onclick="exportData()" 
                class="flex items-center gap-x-2 px-4 py-2 text-sm rounded-2xl border border-zinc-800 hover:bg-zinc-900 transition-colors">
          <i class="fa-solid fa-download text-xs"></i>
          <span class="hidden sm:inline">Export</span>
        </button>
        <button onclick="importData()" 
                class="flex items-center gap-x-2 px-4 py-2 text-sm rounded-2xl border border-zinc-800 hover:bg-zinc-900 transition-colors">
          <i class="fa-solid fa-upload text-xs"></i>
          <span class="hidden sm:inline">Import</span>
        </button>
      </div>
    </div>

    <!-- PLACEHOLDER_TRUNCATED -->
  </div>
</body>
</html>
